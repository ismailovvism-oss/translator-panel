<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вычитка — сверка перевода</title>
<style>
  /* ---------- токены ---------- */
  :root{
    --bg:        #f4f1ea;   /* тёплый бумажный фон */
    --panel:     #fffdf8;
    --ink:       #23211c;
    --ink-soft:  #6b665c;
    --ink-faint: #a39d90;
    --line:      #ddd6c8;
    --line-soft: #ece6d8;
    --accent:    #6b4f2b;   /* приглушённый коричневый — корешок книги */
    --sel:       #efe7d4;
    --mark:      #fff1a8;   /* жёлтая подсветка ==?...== */
    --mark-edge: #e9d36b;

    --st-todo:     #9aa0a6;
    --st-draft:    #c98a1e;
    --st-review:   #2f6fb0;
    --st-verified: #3f8f54;

    --ui: "Segoe UI", system-ui, -apple-system, "Cantarell", "Noto Sans", sans-serif;
    --ru: "Iowan Old Style", "Palatino Linotype", "Cambria", Georgia, "Noto Serif", serif;
    --ar: "Amiri", "Scheherazade New", "Noto Naskh Arabic", "Traditional Arabic", "Geeza Pro", serif;
  }

  *{ box-sizing:border-box; }
  [hidden]{ display:none !important; }   /* чтобы авторский display:flex не перебивал атрибут hidden */
  html,body{ height:100%; margin:0; }
  body{
    font-family:var(--ui);
    color:var(--ink);
    background:var(--bg);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  button{ font-family:inherit; }

  /* ---------- верхняя панель ---------- */
  .topbar{
    position:relative;
    flex:0 0 auto;
    display:flex; align-items:center; gap:12px;
    padding:8px 14px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
  }
  .topbar .btn{
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    padding:6px 12px;
    border-radius:7px;
    cursor:pointer;
    font-size:13px;
  }
  .topbar .btn:hover{ border-color:var(--accent); }
  .topbar .btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .root-name{ font-size:13px; color:var(--ink-soft); }
  .root-name code{ color:var(--ink); font-family:var(--ui); }
  .spacer{ flex:1 1 auto; }
  .counts{ font-size:12px; color:var(--ink-soft); display:flex; gap:10px; }
  .counts .c::before{
    content:""; display:inline-block; width:8px; height:8px;
    border-radius:50%; margin-right:5px; vertical-align:middle;
  }
  .counts .c.todo::before{ background:var(--st-todo); }
  .counts .c.draft::before{ background:var(--st-draft); }
  .counts .c.review::before{ background:var(--st-review); }
  .counts .c.verified::before{ background:var(--st-verified); }

  /* добавление окна-слота */
  .pop{
    position:absolute; top:48px; right:14px; z-index:40;
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    box-shadow:0 8px 28px rgba(0,0,0,.16); padding:12px; width:262px;
    display:flex; flex-direction:column; gap:10px; font-size:13px;
  }
  .pop label{ display:flex; flex-direction:column; gap:4px; color:var(--ink-soft); }
  .pop select, .pop input{
    padding:6px 8px; border:1px solid var(--line); border-radius:7px;
    font-size:13px; background:#fff; color:var(--ink); font-family:inherit;
  }
  .pop-actions{ display:flex; gap:8px; justify-content:flex-end; }

  /* ---------- сетка ---------- */
  .layout{ flex:1 1 auto; display:grid; grid-template-columns:var(--side-w, 300px) 6px 1fr; min-height:0; }
  .layout.side-collapsed{ grid-template-columns:1fr; }
  .layout.side-collapsed .sidebar, .layout.side-collapsed .resizer{ display:none; }

  /* перетаскиваемая граница сайдбара */
  .resizer{ background:var(--line); cursor:col-resize; }
  .resizer:hover{ background:var(--accent); }

  /* ---------- сайдбар ---------- */
  .sidebar{
    border-right:1px solid var(--line);
    background:var(--panel);
    display:flex; flex-direction:column; min-height:0;
  }
  .filter-wrap{ padding:10px; border-bottom:1px solid var(--line-soft); }
  #filter{
    width:100%; padding:7px 10px; border:1px solid var(--line);
    border-radius:7px; font-size:13px; background:#fff; color:var(--ink);
  }
  #filter:focus{ outline:none; border-color:var(--accent); }
  .blocklist{ list-style:none; margin:0; padding:6px; overflow:auto; flex:1 1 auto; }
  .blockitem{
    display:flex; align-items:flex-start; gap:9px;
    padding:8px 9px; border-radius:8px; cursor:pointer;
    border:1px solid transparent;
  }
  .blockitem:hover{ background:var(--sel); }
  .blockitem.active{ background:#fff; border-color:var(--line); box-shadow:0 1px 2px rgba(0,0,0,.04); }
  .dot{ flex:0 0 auto; width:10px; height:10px; border-radius:50%; margin-top:4px; }
  .dot.todo{ background:var(--st-todo); }
  .dot.draft{ background:var(--st-draft); }
  .dot.review{ background:var(--st-review); }
  .dot.verified{ background:var(--st-verified); }
  .dot.none{ background:transparent; border:1px dashed var(--ink-faint); }
  .bi-text{ min-width:0; }
  .bi-pages{ font-size:11px; color:var(--ink-faint); font-variant-numeric:tabular-nums; }
  .bi-title{ font-size:13px; line-height:1.3; color:var(--ink); overflow-wrap:anywhere; }
  .bi-title.empty{ color:var(--ink-faint); font-style:italic; }

  /* ---------- рабочая область ---------- */
  .workspace{ display:flex; flex-direction:column; min-width:0; min-height:0; }
  .empty-state{
    flex:1 1 auto; display:flex; align-items:center; justify-content:center;
    color:var(--ink-faint); font-size:15px; padding:40px; text-align:center;
  }

  .blockhead{
    flex:0 0 auto; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:9px 16px; border-bottom:1px solid var(--line); background:var(--panel);
  }
  .bh-title{ font-family:var(--ru); font-size:16px; }
  .bh-title.empty{ color:var(--ink-faint); font-style:italic; }
  .bh-pages{ font-size:12px; color:var(--ink-faint); font-variant-numeric:tabular-nums; }

  /* сегментный переключатель статуса */
  .statusbar{ display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .statusbar button{
    border:0; background:#fff; color:var(--ink-soft);
    padding:6px 11px; font-size:12px; cursor:pointer; border-right:1px solid var(--line);
  }
  .statusbar button:last-child{ border-right:0; }
  .statusbar button:hover{ background:var(--sel); }
  .statusbar button.on{ color:#fff; }
  .statusbar button.on[data-st="todo"]{ background:var(--st-todo); }
  .statusbar button.on[data-st="draft"]{ background:var(--st-draft); }
  .statusbar button.on[data-st="review"]{ background:var(--st-review); }
  .statusbar button.on[data-st="verified"]{ background:var(--st-verified); }

  .save-btn{
    border:1px solid var(--line); background:#fff; color:var(--ink);
    padding:6px 13px; border-radius:7px; cursor:pointer; font-size:13px;
  }
  .save-btn:hover{ border-color:var(--accent); }
  .dirty{ font-size:18px; color:var(--st-draft); width:12px; visibility:hidden; }
  .dirty.on{ visibility:visible; }

  /* ---------- панели-слоты ---------- */
  .panes{ flex:1 1 auto; display:flex; min-height:0; gap:1px; background:var(--line); }
  .pane{ flex:1 1 0; display:flex; flex-direction:column; min-width:0; min-height:0; background:var(--panel); }

  .pane-head{
    flex:0 0 auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:6px 12px; border-bottom:1px solid var(--line-soft); min-height:34px;
  }
  .pane-label{
    flex:1 1 auto; min-width:0;
    font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--ink-faint);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .pane-tools{ display:flex; gap:2px; }
  .pane-tools button, .mini-btn{
    border:1px solid var(--line); background:#fff; color:var(--ink-soft);
    border-radius:6px; cursor:pointer; font-size:12px; padding:2px 7px; line-height:1.25;
  }
  .pane-tools button:hover, .mini-btn:hover{ border-color:var(--accent); color:var(--ink); }
  .mini-btn{ padding:3px 9px; }

  .pane-body{ flex:1 1 auto; display:flex; flex-direction:column; min-height:0; }

  /* пустой слот: «нет файла» / «Начать перевод» */
  .empty-slot{
    flex:1 1 auto; min-height:160px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
    color:var(--ink-faint); padding:24px; text-align:center; font-size:14px;
  }
  .empty-slot .start-btn{
    border:1px solid var(--accent); background:var(--accent); color:#fff;
    padding:7px 14px; border-radius:8px; cursor:pointer; font-size:13px;
  }

  /* оригинал (RTL, только чтение) */
  .source-view{
    flex:1 1 auto; overflow:auto; padding:18px 22px;
    font-family:var(--ar); font-size:1.45rem; line-height:2.05; color:var(--ink);
  }
  .src-line{ margin:0; }
  .src-blank{ height:.9em; }
  .src-head{ font-size:.78rem; line-height:1.5; color:var(--ink-faint); opacity:.85; }
  .src-comment{ font-size:.72rem; line-height:1.4; color:var(--ink-faint); font-family:var(--ui); direction:ltr; text-align:left; }

  /* редактируемое поле с подсветкой (перевод / вариант) */
  .editor-wrap{
    flex:1 1 auto; position:relative; margin:0; min-height:0;
  }
  .backdrop, .editor{
    position:absolute; inset:0; margin:0; border:0;
    padding:18px 22px;
    font-family:var(--ru); font-size:1.06rem; line-height:1.75;
    white-space:pre-wrap; overflow-wrap:break-word; word-break:break-word; tab-size:2;
    letter-spacing:0;
  }
  .backdrop{ overflow:auto; color:transparent; pointer-events:none; }
  .backdrop mark{ background:var(--mark); box-shadow:0 0 0 1px var(--mark-edge) inset; border-radius:2px; color:transparent; }
  .editor{ resize:none; background:transparent; color:var(--ink); overflow:auto; outline:none; }
  .editor::placeholder{ color:var(--ink-faint); }

  /* тост / предупреждение */
  .toast{
    position:fixed; left:50%; bottom:22px; transform:translateX(-50%);
    background:#2a2620; color:#fdfbf5; padding:11px 18px; border-radius:10px;
    font-size:13px; box-shadow:0 6px 24px rgba(0,0,0,.22); max-width:520px;
    opacity:0; pointer-events:none; transition:opacity .18s; z-index:50;
  }
  .toast.show{ opacity:1; }
  .toast.warn{ background:#7a2c20; }

  .unsupported{ padding:40px; max-width:620px; margin:40px auto; line-height:1.6; }
  .unsupported code{ background:#fff; border:1px solid var(--line); padding:1px 5px; border-radius:4px; }

  /* ---------- адаптив: узкий экран → слоты стопкой ---------- */
  @media (max-width: 820px){
    html, body{ height:auto; overflow:visible; }
    body{ min-height:100%; }
    .topbar{ position:sticky; top:0; z-index:30; }
    .layout, .layout.side-collapsed{ grid-template-columns:1fr; }
    .resizer{ display:none; }
    .sidebar{ border-right:0; border-bottom:1px solid var(--line); }
    .blocklist{ max-height:40vh; }
    .panes{ flex-direction:column; flex:0 0 auto; }
    .pane{ flex:0 0 auto; }
    .pane .editor-wrap{ height:60vh; flex:0 0 auto; }
    .pane .source-view{ height:60vh; flex:0 0 auto; }
  }
</style>
</head>
<body>

<div class="topbar">
  <button id="sideToggle" class="btn" title="Свернуть/показать список блоков">☰</button>
  <button id="openBtn" class="btn primary">Открыть папку</button>
  <button id="reopenBtn" class="btn" hidden></button>
  <span class="root-name" id="rootName"></span>
  <span class="spacer"></span>
  <button id="addSlotBtn" class="btn" title="Добавить окно-слот">＋ Окно</button>
  <span class="counts" id="counts" hidden></span>

  <div class="pop" id="slotPop" hidden>
    <label>Тип окна
      <select id="popRole">
        <option value="source">Оригинал (AR)</option>
        <option value="translation">Перевод (RU)</option>
        <option value="variant">Вариант</option>
      </select>
    </label>
    <label id="popLabelWrap" hidden>Ярлык источника
      <input id="popLabel" type="text" placeholder="gemini, chatgpt, мой черновик…">
    </label>
    <div class="pop-actions">
      <button id="popCancel" class="btn">Отмена</button>
      <button id="popAdd" class="btn primary">Добавить</button>
    </div>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="filter-wrap">
      <input id="filter" type="text" placeholder="Фильтр: заголовок, страницы, статус…">
    </div>
    <ul class="blocklist" id="blockList"></ul>
  </aside>

  <div class="resizer" id="resizer"></div>

  <section class="workspace">
    <div class="blockhead" id="blockHead" hidden>
      <span class="bh-title" id="bhTitle"></span>
      <span class="bh-pages" id="bhPages"></span>
      <span class="spacer"></span>
      <div class="statusbar" id="statusBar">
        <button data-st="todo">todo</button>
        <button data-st="draft">draft</button>
        <button data-st="review">review</button>
        <button data-st="verified">verified</button>
      </div>
      <button class="save-btn" id="saveBtn">Сохранить</button>
      <span class="dirty" id="dirty">●</span>
    </div>

    <div class="panes" id="panes" hidden></div>

    <div class="empty-state" id="emptyState">
      Откройте корневую папку репозитория перевода —<br>в ней должны лежать <code style="font-family:var(--ui)">source/</code> и <code style="font-family:var(--ui)">translation/</code>.
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ===================================================================
   Вычитка — фаза 1. Один файл, ваниль, File System Access API.
   Слоты-окна: произвольная раскладка из source / translation / variant.
   Раскладка хранится в localStorage пользователя (не в репозитории).
   Спаривание файлов по ведущему диапазону страниц в имени файла.
   =================================================================== */

const STATUSES = ["todo", "draft", "review", "verified"];
const MARKER_RE = () => /==\?[\s\S]*?==/g;   // живой открытый вопрос ==?...==
const LAYOUT_KEY = "vychitka-layout";
const SIDE_W_KEY = "vychitka-side-w";
const SIDE_COLLAPSE_KEY = "vychitka-side-collapsed";

/* ---- состояние ---- */
const state = {
  rootHandle: null,
  dirs: { source: null, translation: null, variants: null },
  blocks: [],        // [{range, sortKey, title, status, srcHandle, trHandle}]
  current: null,     // активный блок
  layout: [],        // [{role:'source'} | {role:'translation'} | {role:'variant', label}]
  slots: [],         // отрисованные слоты текущего блока
  transSlot: null,   // слот основного перевода (для статуса/сохранения/Ctrl+S)
};

/* ---- ссылки на DOM ---- */
const $ = (id) => document.getElementById(id);
const els = {
  layout: document.querySelector(".layout"), resizer: $("resizer"), sideToggle: $("sideToggle"),
  openBtn: $("openBtn"), reopenBtn: $("reopenBtn"), rootName: $("rootName"),
  addSlotBtn: $("addSlotBtn"), counts: $("counts"),
  pop: $("slotPop"), popRole: $("popRole"), popLabel: $("popLabel"),
  popLabelWrap: $("popLabelWrap"), popAdd: $("popAdd"), popCancel: $("popCancel"),
  filter: $("filter"), list: $("blockList"),
  head: $("blockHead"), bhTitle: $("bhTitle"), bhPages: $("bhPages"),
  statusBar: $("statusBar"), saveBtn: $("saveBtn"), dirty: $("dirty"),
  panes: $("panes"), emptyState: $("emptyState"), toast: $("toast"),
};

/* ===================== утилиты ===================== */

function esc(s){
  return s.replace(/[&<>]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[c]));
}

let toastTimer = null;
function toast(msg, warn){
  els.toast.textContent = msg;
  els.toast.classList.toggle("warn", !!warn);
  els.toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => els.toast.classList.remove("show"), warn ? 4200 : 1800);
}

// ведущий диапазон: "390-393.md" -> "390-393"; "390.md" -> "390"
function rangeOf(name){
  const m = name.match(/^(\d+(?:-\d+)?)/);
  return m ? m[1] : null;
}
function sortKeyOf(range){
  const m = range.match(/^(\d+)/);
  return m ? parseInt(m[1], 10) : 0;
}
// заголовок/ярлык из имени: "390-393 Заголовок.md" -> "Заголовок"
function titleOf(name){
  return name.replace(/\.md$/i, "").replace(/^\d+(?:-\d+)?\s*/, "").trim();
}
// ярлык варианта → безопасное имя файла (без разделителей пути и т.п.)
function sanitizeLabel(s){
  return String(s || "").replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, " ").trim();
}
// ключ слота — для сопоставления при перестроении раскладки
function slotKey(spec){
  return spec.role === "variant" ? "variant|" + spec.label : spec.role;
}
function slotKeyOf(slot){
  return slot.role === "variant" ? "variant|" + slot.label : slot.role;
}

/* ---- фронтматтер: разбор и сборка ---- */
function splitFrontmatter(text){
  const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);
  if(!m) return { fmLines: null, body: text };
  return { fmLines: m[1].split(/\r?\n/), body: text.slice(m[0].length) };
}
function fmGet(lines, key){
  if(!lines) return null;
  for(const l of lines){
    const m = l.match(/^([\w-]+):\s*(.*)$/);
    if(m && m[1] === key) return m[2].trim();
  }
  return null;
}
function fmSet(lines, key, val){
  let found = false;
  const out = (lines || []).map(l => {
    const m = l.match(/^([\w-]+):\s*(.*)$/);
    if(m && m[1] === key){ found = true; return `${key}: ${val}`; }
    return l;
  });
  if(!found) out.push(`${key}: ${val}`);
  return out;
}
// собрать файл перевода: обновлённый фронтматтер + нормализованное тело
function buildTranslation(fmLines, body){
  const fm = (fmLines && fmLines.length) ? fmLines : ["status: todo"];
  return `---\n${fm.join("\n")}\n---\n\n${body.replace(/^\n+/, "")}`;
}

/* ===================== доступ к файлам ===================== */

async function ensurePermission(handle, mode){
  const opts = { mode };
  if((await handle.queryPermission(opts)) === "granted") return true;
  if((await handle.requestPermission(opts)) === "granted") return true;
  return false;
}
async function readFile(handle){
  const f = await handle.getFile();
  return await f.text();
}
async function writeFile(handle, content){
  const w = await handle.createWritable();
  await w.write(content);
  await w.close();
}
// папка variants/ — может отсутствовать; создаётся при первом сохранении варианта
async function ensureVariantsDir(create){
  if(state.dirs.variants) return state.dirs.variants;
  try{
    const d = await state.rootHandle.getDirectoryHandle("variants", { create: !!create });
    state.dirs.variants = d;
    return d;
  }catch{ return null; }
}

/* ---- IndexedDB: запоминаем корневую папку, чтобы выбрать её один раз ---- */
const IDB = (() => {
  const open = () => new Promise((res, rej) => {
    const r = indexedDB.open("vychitka-fs", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("h");
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
  return {
    async get(k){ const db = await open(); return new Promise((res,rej)=>{ const t=db.transaction("h").objectStore("h").get(k); t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error); }); },
    async set(k,v){ const db = await open(); return new Promise((res,rej)=>{ const t=db.transaction("h","readwrite").objectStore("h").put(v,k); t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); },
  };
})();

/* ===================== раскладка слотов (localStorage) ===================== */

function normalizeSpec(s){
  if(!s || typeof s !== "object") return null;
  if(s.role === "source" || s.role === "translation") return { role: s.role };
  if(s.role === "variant"){
    const label = sanitizeLabel(s.label || "");
    return label ? { role: "variant", label } : null;
  }
  return null;
}
function loadLayout(){
  try{
    const raw = localStorage.getItem(LAYOUT_KEY);
    if(raw){
      const arr = JSON.parse(raw);
      if(Array.isArray(arr)){
        const out = arr.map(normalizeSpec).filter(Boolean);
        if(out.length) return out;
      }
    }
  }catch{}
  return [{ role: "source" }, { role: "translation" }];
}
function saveLayout(){
  try{ localStorage.setItem(LAYOUT_KEY, JSON.stringify(state.layout)); }catch{}
}

/* ===================== открытие и сканирование ===================== */

async function pickFolder(){
  try{
    const handle = await window.showDirectoryPicker({ id: "vychitka-root", mode: "readwrite" });
    await IDB.set("root", handle);
    await useRoot(handle);
  }catch(e){
    if(e && e.name === "AbortError") return;
    console.error(e); toast("Не удалось открыть папку: " + e.message, true);
  }
}

async function reopenFolder(){
  const handle = await IDB.get("root");
  if(!handle){ toast("Нет сохранённой папки", true); return; }
  if(!(await ensurePermission(handle, "readwrite"))){
    toast("Нет доступа к папке — выберите заново", true); return;
  }
  await useRoot(handle);
}

async function useRoot(handle){
  state.rootHandle = handle;
  let src, tr, varDir = null;
  try{ src = await handle.getDirectoryHandle("source"); }
  catch{ toast("В папке нет подпапки source/", true); return; }
  try{ tr  = await handle.getDirectoryHandle("translation"); }
  catch{ toast("В папке нет подпапки translation/", true); return; }
  try{ varDir = await handle.getDirectoryHandle("variants"); }   // необязательна
  catch{ varDir = null; }
  state.dirs = { source: src, translation: tr, variants: varDir };

  els.rootName.innerHTML = "Папка: <code>" + esc(handle.name) + "</code>";
  els.reopenBtn.hidden = true;

  await scan();
}

async function scan(){
  // источники
  const sources = new Map();   // range -> handle
  for await (const [name, h] of state.dirs.source.entries()){
    if(h.kind !== "file" || !/\.md$/i.test(name)) continue;
    const r = rangeOf(name);
    if(r) sources.set(r, h);
  }
  // переводы (читаем фронтматтер ради статуса)
  const trans = new Map();     // range -> {handle, title, status}
  for await (const [name, h] of state.dirs.translation.entries()){
    if(h.kind !== "file" || !/\.md$/i.test(name)) continue;
    const r = rangeOf(name);
    if(!r) continue;
    let status = "todo";
    try{
      const { fmLines } = splitFrontmatter(await readFile(h));
      const s = fmGet(fmLines, "status");
      if(STATUSES.includes(s)) status = s;
    }catch{}
    trans.set(r, { handle: h, title: titleOf(name), status });
  }

  // объединяем по диапазону
  const ranges = new Set([...sources.keys(), ...trans.keys()]);
  const blocks = [];
  for(const r of ranges){
    const t = trans.get(r);
    blocks.push({
      range: r,
      sortKey: sortKeyOf(r),
      title: t ? t.title : "",
      status: t ? t.status : null,        // null = нет файла перевода
      srcHandle: sources.get(r) || null,
      trHandle: t ? t.handle : null,
    });
  }
  blocks.sort((a,b) => a.sortKey - b.sortKey || a.range.localeCompare(b.range));
  state.blocks = blocks;

  renderCounts();
  renderList();
  if(!blocks.length){ toast("Блоки не найдены", true); }
}

/* ===================== отрисовка списка ===================== */

function renderCounts(){
  const c = { todo:0, draft:0, review:0, verified:0 };
  for(const b of state.blocks) if(b.status && c[b.status] !== undefined) c[b.status]++;
  els.counts.hidden = false;
  els.counts.innerHTML = STATUSES.map(s =>
    `<span class="c ${s}">${c[s]}</span>`).join("");
}

function renderList(){
  const q = els.filter.value.trim().toLowerCase();
  els.list.innerHTML = "";
  for(const b of state.blocks){
    if(q){
      const hay = (b.range + " " + b.title + " " + (b.status||"")).toLowerCase();
      if(!hay.includes(q)) continue;
    }
    const li = document.createElement("li");
    li.className = "blockitem" + (state.current && state.current.range === b.range ? " active" : "");
    li.dataset.range = b.range;
    li.innerHTML =
      `<span class="dot ${b.status || "none"}" title="${b.status || "нет перевода"}"></span>` +
      `<span class="bi-text">` +
        `<span class="bi-pages">${esc(b.range)}</span><br>` +
        `<span class="bi-title${b.title ? "" : " empty"}">${esc(b.title || "(без заголовка)")}</span>` +
      `</span>`;
    li.addEventListener("click", () => openBlock(b));
    els.list.appendChild(li);
  }
}

/* ===================== выбор и показ блока ===================== */

async function openBlock(b){
  if(state.current && anyDirty()){
    if(!confirm("Есть несохранённые изменения. Переключить блок без сохранения?")) return;
  }
  state.current = b;

  for(const li of els.list.children)
    li.classList.toggle("active", li.dataset.range === b.range);

  els.bhTitle.textContent = b.title || "(без заголовка)";
  els.bhTitle.classList.toggle("empty", !b.title);
  els.bhPages.textContent = b.range;

  els.emptyState.hidden = true;
  els.head.hidden = false;
  els.panes.hidden = false;

  await renderSlots({ reload: true });

  if(state.transSlot && state.transSlot.editor) state.transSlot.editor.focus();
}

/* ===================== слоты-окна ===================== */

function renderSourceHTML(text){
  return text.split(/\r?\n/).map(line => {
    if(line.trim() === "") return `<div class="src-blank"></div>`;
    if(/^\s*<!--[\s\S]*-->\s*$/.test(line))
      return `<div class="src-comment">${esc(line.trim())}</div>`;
    const h = line.match(/^#{1,6}\s+(.*)$/);
    if(h) return `<div class="src-head">${esc(h[1])}</div>`;
    return `<div class="src-line">${esc(line)}</div>`;
  }).join("");
}

function buildSlotDOM(spec, i){
  const slot = {
    role: spec.role, label: spec.label || "", index: i,
    editor: null, backdrop: null, sourceView: null,
    fileHandle: null, fmLines: null, savedText: "", dot: null,
    sourceText: "", hadFile: false,
  };
  const pane = document.createElement("div");
  pane.className = "pane"; pane.dataset.index = i; pane.dataset.role = spec.role;

  const head = document.createElement("div");
  head.className = "pane-head";

  const label = document.createElement("span");
  label.className = "pane-label";
  label.textContent =
    spec.role === "source" ? "Оригинал · AR" :
    spec.role === "translation" ? "Перевод · RU" :
    "Вариант · " + spec.label;
  head.appendChild(label);

  if(spec.role === "variant"){
    const save = document.createElement("button");
    save.className = "mini-btn"; save.dataset.action = "save-variant";
    save.textContent = "Сохранить как вариант";
    head.appendChild(save);
    const dot = document.createElement("span");
    dot.className = "dirty"; dot.textContent = "●";
    slot.dot = dot; head.appendChild(dot);
  }

  const tools = document.createElement("span");
  tools.className = "pane-tools";
  tools.innerHTML =
    `<button data-tool="left" title="Левее / выше">◂</button>` +
    `<button data-tool="right" title="Правее / ниже">▸</button>` +
    `<button data-tool="remove" title="Убрать окно">×</button>`;
  head.appendChild(tools);

  const body = document.createElement("div");
  body.className = "pane-body";

  pane.appendChild(head); pane.appendChild(body);
  slot.pane = pane; slot.head = head; slot.body = body;
  return slot;
}

// создать редактируемое поле (перевод / вариант) с подсветкой ==?...==
function makeEditor(slot, value){
  slot.body.innerHTML = "";
  const wrap = document.createElement("div"); wrap.className = "editor-wrap";
  const bd = document.createElement("div"); bd.className = "backdrop"; bd.setAttribute("aria-hidden","true");
  const ta = document.createElement("textarea");
  ta.className = "editor"; ta.dir = "ltr"; ta.spellcheck = true;
  ta.placeholder = slot.role === "variant" ? "Вставьте вариант перевода…" : "Перевод…";
  ta.value = value || "";
  wrap.appendChild(bd); wrap.appendChild(ta); slot.body.appendChild(wrap);
  slot.editor = ta; slot.backdrop = bd;

  ta.addEventListener("input", () => { updateBackdrop(slot); updateDirtyUI(); });
  ta.addEventListener("scroll", () => { bd.scrollTop = ta.scrollTop; bd.scrollLeft = ta.scrollLeft; });
  updateBackdrop(slot);
}

function makeSource(slot, text, hasFile){
  slot.body.innerHTML = "";
  const view = document.createElement("div");
  view.className = "source-view"; view.dir = "rtl";
  view.innerHTML = hasFile
    ? renderSourceHTML(text)
    : `<div class="src-comment">— нет файла оригинала для диапазона ${esc(state.current.range)} —</div>`;
  slot.body.appendChild(view);
  slot.sourceView = view;
}

function makeStart(slot){
  slot.body.innerHTML = "";
  const box = document.createElement("div");
  box.className = "empty-slot";
  box.innerHTML =
    `<div>Перевод для диапазона ${esc(state.current.range)} ещё не начат.</div>` +
    `<button class="start-btn" data-action="start-translation">Начать перевод</button>`;
  slot.body.appendChild(box);
}

function updateBackdrop(slot){
  if(!slot.backdrop || !slot.editor) return;
  let html = esc(slot.editor.value).replace(MARKER_RE(), m => `<mark>${m}</mark>`);
  if(html.endsWith("\n")) html += " ";
  slot.backdrop.innerHTML = html;
  slot.backdrop.scrollTop = slot.editor.scrollTop;
  slot.backdrop.scrollLeft = slot.editor.scrollLeft;
}

// загрузить содержимое слота с диска (свежим)
async function loadSlotFromDisk(slot, b){
  if(slot.role === "source"){
    let text = "", has = !!b.srcHandle;
    if(has){ try{ text = await readFile(b.srcHandle); }catch{ text = ""; has = false; } }
    slot.fileHandle = b.srcHandle || null; slot.hadFile = has; slot.sourceText = text;
    makeSource(slot, text, has);
  } else if(slot.role === "translation"){
    if(b.trHandle){
      let body = "", fmLines = ["status: todo", "pages: " + b.range, "glossary_checked: false"];
      try{
        const p = splitFrontmatter(await readFile(b.trHandle));
        fmLines = p.fmLines || fmLines;
        body = p.body.replace(/^\n+/, "").replace(/\s+$/, "");
      }catch(e){ toast("Не удалось прочитать перевод: " + e.message, true); }
      slot.fileHandle = b.trHandle; slot.fmLines = fmLines; slot.savedText = body;
      makeEditor(slot, body);
    } else {
      slot.fileHandle = null; slot.fmLines = null; slot.savedText = "";
      makeStart(slot);
    }
  } else { // variant
    let text = "", h = null;
    const dir = state.dirs.variants;
    if(dir){
      const name = `${b.range} ${slot.label}.md`;
      try{ h = await dir.getFileHandle(name); text = await readFile(h); }
      catch{ h = null; text = ""; }
    }
    slot.fileHandle = h; slot.savedText = text;
    makeEditor(slot, text);
  }
}

// восстановить содержимое слота из памяти (при переупорядочивании/добавлении) —
// чтобы не потерять несохранённые правки
function restoreSlot(slot, old){
  if(slot.role === "source"){
    slot.fileHandle = old.fileHandle; slot.hadFile = old.hadFile; slot.sourceText = old.sourceText;
    makeSource(slot, old.sourceText || "", !!old.hadFile);
  } else if(slot.role === "translation"){
    if(old.fileHandle){
      slot.fileHandle = old.fileHandle; slot.fmLines = old.fmLines; slot.savedText = old.savedText;
      makeEditor(slot, old.curValue != null ? old.curValue : old.savedText);
    } else {
      slot.fileHandle = null; slot.fmLines = null; slot.savedText = "";
      makeStart(slot);
    }
  } else { // variant
    slot.fileHandle = old.fileHandle; slot.savedText = old.savedText;
    makeEditor(slot, old.curValue != null ? old.curValue : old.savedText);
  }
}

// перестроить все слоты по текущей раскладке
async function renderSlots({ reload = false, reloadKeys = null } = {}){
  const b = state.current;
  if(!b) return;

  // снимок текущих значений (чтобы пережить перестроение)
  const oldByKey = new Map();
  for(const s of state.slots){
    if(s.editor) s.curValue = s.editor.value;
    oldByKey.set(slotKeyOf(s), s);
  }

  els.panes.innerHTML = "";
  const slots = [];
  for(let i = 0; i < state.layout.length; i++){
    const slot = buildSlotDOM(state.layout[i], i);
    els.panes.appendChild(slot.pane);
    slots.push(slot);
  }
  state.slots = slots;

  for(const slot of slots){
    const key = slotKeyOf(slot);
    const old = oldByKey.get(key);
    const mustLoad = reload || !old || (reloadKeys && reloadKeys.has(key));
    if(mustLoad) await loadSlotFromDisk(slot, b);
    else restoreSlot(slot, old);
  }

  // шапка блока: статус/сохранение работают с основным переводом
  const ts = slots.find(s => s.role === "translation") || null;
  state.transSlot = ts;
  const hasFile = !!(ts && ts.fileHandle);
  els.statusBar.hidden = !hasFile;
  els.saveBtn.hidden = !hasFile;
  renderStatusBar(hasFile ? b.status : null);
  updateDirtyUI();
}

function renderStatusBar(status){
  for(const btn of els.statusBar.children)
    btn.classList.toggle("on", btn.dataset.st === status);
}

/* ===================== изменения и сохранение ===================== */

function slotDirty(s){
  return !!s.editor && (s.role === "translation" || s.role === "variant") && s.editor.value !== s.savedText;
}
function anyDirty(){ return state.slots.some(slotDirty); }
function updateDirtyUI(){
  els.dirty.classList.toggle("on", anyDirty());
  for(const s of state.slots) if(s.dot) s.dot.classList.toggle("on", slotDirty(s));
}
function hasLiveMarker(text){ return MARKER_RE().test(text); }

async function saveTranslation(slot){
  const ts = slot || state.transSlot;
  if(!ts || !ts.fileHandle){ toast("Нет файла перевода — сохранять некуда", true); return; }
  if(!(await ensurePermission(state.rootHandle, "readwrite"))){ toast("Нет прав на запись", true); return; }
  const body = ts.editor.value;
  try{
    await writeFile(ts.fileHandle, buildTranslation(ts.fmLines, body));
    ts.savedText = body; updateDirtyUI();
    toast("Сохранено");
  }catch(e){ console.error(e); toast("Ошибка записи: " + e.message, true); }
}

async function saveVariant(slot){
  const b = state.current;
  if(!b || !slot) return;
  if(!(await ensurePermission(state.rootHandle, "readwrite"))){ toast("Нет прав на запись", true); return; }
  try{
    let h = slot.fileHandle;
    if(!h){
      const dir = await ensureVariantsDir(true);
      if(!dir){ toast("Не удалось создать папку variants/", true); return; }
      h = await dir.getFileHandle(`${b.range} ${slot.label}.md`, { create: true });
      slot.fileHandle = h;
    }
    await writeFile(h, slot.editor.value);
    slot.savedText = slot.editor.value; updateDirtyUI();
    toast("Вариант сохранён: " + slot.label);
  }catch(e){ console.error(e); toast("Ошибка записи варианта: " + e.message, true); }
}

async function startTranslation(){
  const b = state.current;
  if(!b || b.trHandle) return;
  const raw = prompt("Заголовок перевода (можно оставить пустым):", "");
  if(raw === null) return;                    // отмена
  const title = raw.trim();
  const name = title ? `${b.range} ${title}.md` : `${b.range}.md`;
  if(!(await ensurePermission(state.rootHandle, "readwrite"))){ toast("Нет прав на запись", true); return; }
  try{
    const handle = await state.dirs.translation.getFileHandle(name, { create: true });
    const content = buildTranslation(["status: todo", "pages: " + b.range, "glossary_checked: false"], "");
    await writeFile(handle, content);
    b.trHandle = handle; b.title = title; b.status = "todo";
    els.bhTitle.textContent = b.title || "(без заголовка)";
    els.bhTitle.classList.toggle("empty", !b.title);
    renderCounts(); renderList();
    await renderSlots({ reloadKeys: new Set(["translation"]) });
    if(state.transSlot && state.transSlot.editor) state.transSlot.editor.focus();
    toast("Перевод начат");
  }catch(e){ console.error(e); toast("Не удалось создать файл: " + e.message, true); }
}

async function setStatus(newStatus){
  const b = state.current, ts = state.transSlot;
  if(!b || !ts || !ts.fileHandle) return;

  if(newStatus === "verified" && hasLiveMarker(ts.editor.value)){
    toast("Нельзя ставить verified: в переводе остались открытые вопросы ==?…==", true);
    return;
  }
  ts.fmLines = fmSet(ts.fmLines, "status", newStatus);
  b.status = newStatus;
  renderStatusBar(newStatus);

  if(!(await ensurePermission(state.rootHandle, "readwrite"))){ toast("Нет прав на запись", true); return; }
  try{
    await writeFile(ts.fileHandle, buildTranslation(ts.fmLines, ts.editor.value));
    ts.savedText = ts.editor.value; updateDirtyUI();
    renderCounts();
    for(const li of els.list.children){
      if(li.dataset.range === b.range){
        const dot = li.querySelector(".dot");
        dot.className = "dot " + newStatus; dot.title = newStatus;
      }
    }
    toast("Статус: " + newStatus);
  }catch(e){ console.error(e); toast("Ошибка записи: " + e.message, true); }
}

// Ctrl/Cmd+S — сохранить активное окно (или основной перевод)
function saveFocused(){
  const ae = document.activeElement;
  const s = state.slots.find(x => x.editor === ae);
  if(s){ if(s.role === "translation") saveTranslation(s); else saveVariant(s); return; }
  if(state.transSlot && state.transSlot.fileHandle) saveTranslation();
}

/* ===================== операции с раскладкой ===================== */

function addSlot(spec){
  state.layout.push(spec); saveLayout();
  if(state.current) renderSlots({ reload: false });
}
function removeSlot(index){
  const spec = state.layout[index];
  if(!spec) return;
  const key = slotKey(spec);
  const s = state.slots.find(x => slotKeyOf(x) === key);
  if(s && slotDirty(s) && !confirm("В этом окне есть несохранённые изменения. Убрать окно и потерять их?")) return;
  state.layout.splice(index, 1); saveLayout();
  if(state.current) renderSlots({ reload: false });
}
function moveSlot(index, dir){
  const j = index + dir;
  if(j < 0 || j >= state.layout.length) return;
  const tmp = state.layout[index]; state.layout[index] = state.layout[j]; state.layout[j] = tmp;
  saveLayout();
  if(state.current) renderSlots({ reload: false });
}

/* ---- попап добавления окна ---- */
function openPop(){
  els.popRole.value = "variant";
  els.popLabelWrap.hidden = false;
  els.popLabel.value = "";
  els.pop.hidden = false;
  els.popLabel.focus();
}
function closePop(){ els.pop.hidden = true; }

/* ===================== события ===================== */

/* ---- боковая панель: сворачивание и ширина (в localStorage) ---- */
function applySidePrefs(){
  const w = parseInt(localStorage.getItem(SIDE_W_KEY) || "", 10);
  if(w) els.layout.style.setProperty("--side-w", w + "px");
  els.layout.classList.toggle("side-collapsed", localStorage.getItem(SIDE_COLLAPSE_KEY) === "1");
}
els.sideToggle.addEventListener("click", () => {
  const c = els.layout.classList.toggle("side-collapsed");
  try{ localStorage.setItem(SIDE_COLLAPSE_KEY, c ? "1" : "0"); }catch{}
});
(function(){
  let dragging = false;
  els.resizer.addEventListener("pointerdown", (e) => {
    dragging = true; els.resizer.setPointerCapture(e.pointerId);
    document.body.style.userSelect = "none";
  });
  els.resizer.addEventListener("pointermove", (e) => {
    if(!dragging) return;
    const w = Math.max(180, Math.min(560, Math.round(e.clientX)));
    els.layout.style.setProperty("--side-w", w + "px");
  });
  const end = () => {
    if(!dragging) return;
    dragging = false; document.body.style.userSelect = "";
    const w = parseInt(els.layout.style.getPropertyValue("--side-w"), 10);
    if(w) try{ localStorage.setItem(SIDE_W_KEY, String(w)); }catch{}
  };
  els.resizer.addEventListener("pointerup", end);
  els.resizer.addEventListener("pointercancel", end);
})();

els.openBtn.addEventListener("click", pickFolder);
els.reopenBtn.addEventListener("click", reopenFolder);
els.filter.addEventListener("input", renderList);
els.saveBtn.addEventListener("click", () => saveTranslation());

els.statusBar.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-st]");
  if(btn) setStatus(btn.dataset.st);
});

// действия внутри слотов (сохранить вариант / начать перевод / инструменты раскладки)
els.panes.addEventListener("click", (e) => {
  const tool = e.target.closest("[data-tool]");
  if(tool){
    const pane = tool.closest(".pane");
    const idx = parseInt(pane.dataset.index, 10);
    const act = tool.dataset.tool;
    if(act === "left") moveSlot(idx, -1);
    else if(act === "right") moveSlot(idx, 1);
    else if(act === "remove") removeSlot(idx);
    return;
  }
  const sv = e.target.closest("[data-action='save-variant']");
  if(sv){
    const pane = sv.closest(".pane");
    saveVariant(state.slots[parseInt(pane.dataset.index, 10)]);
    return;
  }
  if(e.target.closest("[data-action='start-translation']")) startTranslation();
});

// попап добавления окна
els.addSlotBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  if(els.pop.hidden) openPop(); else closePop();
});
els.popRole.addEventListener("change", () => {
  els.popLabelWrap.hidden = els.popRole.value !== "variant";
});
els.popAdd.addEventListener("click", () => {
  const role = els.popRole.value;
  let spec;
  if(role === "variant"){
    const label = sanitizeLabel(els.popLabel.value);
    if(!label){ toast("Введите ярлык варианта (например, gemini)", true); return; }
    spec = { role: "variant", label };
  } else {
    spec = { role };
  }
  addSlot(spec); closePop();
});
els.popCancel.addEventListener("click", closePop);
document.addEventListener("click", (e) => {
  if(!els.pop.hidden && !els.pop.contains(e.target) && e.target !== els.addSlotBtn) closePop();
});

document.addEventListener("keydown", (e) => {
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s"){
    e.preventDefault(); saveFocused();
  }
  if(e.key === "Escape" && !els.pop.hidden) closePop();
});

window.addEventListener("beforeunload", (e) => {
  if(state.current && anyDirty()){ e.preventDefault(); e.returnValue = ""; }
});

/* ===================== запуск ===================== */

(async function init(){
  if(!window.showDirectoryPicker){
    document.body.innerHTML =
      `<div class="unsupported">
        <h2>Браузер не поддерживается</h2>
        <p>Нужен <b>File System Access API</b> — он есть в Chrome и Edge на десктопе.
        Откройте файл в одном из них.</p>
        <p>Если открываете двойным кликом как <code>file://</code> — это нормально, API работает и так.</p>
      </div>`;
    return;
  }
  state.layout = loadLayout();
  applySidePrefs();
  try{
    const saved = await IDB.get("root");
    if(saved){
      els.reopenBtn.hidden = false;
      els.reopenBtn.textContent = "Открыть «" + saved.name + "»";
    }
  }catch{}
})();
</script>
</body>
